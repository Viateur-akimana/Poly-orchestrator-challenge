# External Secrets Operator — ClusterSecretStore + ExternalSecrets
#
# Prerequisites:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
#
# The IRSA role (arn:aws:iam::ACCOUNT:role/skyline-external-secrets) must have:
#   secretsmanager:GetSecretValue on arn:aws:secretsmanager:us-east-1:ACCOUNT:secret:skyline/*
#
# Store secrets in AWS Secrets Manager as JSON objects:
#   aws secretsmanager create-secret --name skyline/postgres \
#     --secret-string '{"POSTGRES_DB":"skyline","POSTGRES_USER":"skyline_user","POSTGRES_PASSWORD":"<strong-pass>"}'
#   aws secretsmanager create-secret --name skyline/backend \
#     --secret-string '{"JWT_SECRET":"<strong-secret>","JWT_REFRESH_SECRET":"<strong-secret>","POSTGRES_PASSWORD":"<strong-pass>"}'

---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-secret
  namespace: skyline
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: postgres-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: skyline/postgres

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backend-secret
  namespace: skyline
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: backend-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: skyline/backend
