---
# AWS Load Balancer Controller must be installed in the cluster first.
# Install: https://docs.aws.amazon.com/eks/latest/userguide/aws-load-balancer-controller.html
#
# Path-based routing:
#   /api/*  → backend service (port 5004)
#   /*      → frontend service (port 80, nginx serves SPA + proxies /api)
#
# Using the frontend service for all routes is simpler because nginx
# already proxies /api internally. The Ingress here just exposes port 80.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: skyline-ingress
  namespace: skyline
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # Set ACM_CERT_ARN via: kubectl annotate ingress skyline-ingress -n skyline \
    #   alb.ingress.kubernetes.io/certificate-arn=arn:aws:acm:us-east-1:ACCOUNT:certificate/CERT-ID
    # Or patch this file in CI with the cert ARN from: aws acm list-certificates
    alb.ingress.kubernetes.io/certificate-arn: "${ACM_CERT_ARN}"
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
