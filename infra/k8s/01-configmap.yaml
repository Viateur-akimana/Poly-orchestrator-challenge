apiVersion: v1
kind: ConfigMap
metadata:
  name: skyline-config
  namespace: skyline
data:
  NODE_ENV: "production"
  PORT: "5004"
  # In EKS, services are reachable via ClusterIP DNS:
  #   <service-name>.<namespace>.svc.cluster.local
  DATABASE_URL: "postgresql://skyline_user:$(POSTGRES_PASSWORD)@postgres.skyline.svc.cluster.local:5432/skyline"
  REDIS_URL: "redis://redis.skyline.svc.cluster.local:6379"
  # BACKEND_HOST used by nginx in the frontend to proxy /api/ calls
  BACKEND_HOST: "backend.skyline.svc.cluster.local"
