---
# backend-secret is provisioned by the ExternalSecret in 00b-external-secrets.yaml.
# It pulls from AWS Secrets Manager key: skyline/backend
# Keys required: JWT_SECRET, JWT_REFRESH_SECRET, POSTGRES_PASSWORD

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: skyline
  labels:
    app: backend
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
        tier: api
    spec:
      # Ensure backend pods are spread across nodes for HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: backend
          # CI replaces BACKEND_IMAGE_TAG with the git SHA before kubectl apply
          image: 764988411222.dkr.ecr.us-east-1.amazonaws.com/skyline-prod-backend:${BACKEND_IMAGE_TAG}
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          ports:
            - containerPort: 5004
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5004"
            - name: REDIS_URL
              value: "redis://redis.skyline.svc.cluster.local:6379"
            - name: ADMIN_EMAIL
              value: "admin@skyline.local"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: JWT_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: JWT_REFRESH_SECRET
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://skyline_user:$(POSTGRES_PASSWORD)@postgres.skyline.svc.cluster.local:5432/skyline"
            - name: CLIENT_URL
              value: "http://$(FRONTEND_INGRESS_HOST)"
          command: ["sh", "-c", "npx prisma migrate deploy && node dist/server.js"]
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 5004
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5004
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: skyline
  labels:
    app: backend
    tier: api
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 5004
      targetPort: 5004
      name: http
