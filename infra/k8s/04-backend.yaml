---
# Secret: backend app secrets (in prod use External Secrets Operator + AWS Secrets Manager)
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: skyline
type: Opaque
stringData:
  JWT_SECRET: "change-me-in-production"
  JWT_REFRESH_SECRET: "change-me-in-production-refresh"
  POSTGRES_PASSWORD: "skyline_pass"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: skyline
  labels:
    app: backend
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
        tier: api
    spec:
      # Ensure backend pods are spread across nodes for HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: backend
      containers:
        - name: backend
          # Replace with your ECR image URI after push
          image: 764988411222.dkr.ecr.us-east-1.amazonaws.com/skyline-prod-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5004
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5004"
            - name: REDIS_URL
              value: "redis://redis.skyline.svc.cluster.local:6379"
            - name: ADMIN_EMAIL
              value: "admin@skyline.local"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: JWT_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: JWT_REFRESH_SECRET
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://skyline_user:$(POSTGRES_PASSWORD)@postgres.skyline.svc.cluster.local:5432/skyline"
            - name: CLIENT_URL
              value: "http://$(FRONTEND_INGRESS_HOST)"
          command: ["sh", "-c", "npx prisma migrate deploy && node dist/server.js"]
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 5004
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5004
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: skyline
  labels:
    app: backend
    tier: api
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 5004
      targetPort: 5004
      name: http
