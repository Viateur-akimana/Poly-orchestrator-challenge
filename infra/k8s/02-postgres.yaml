---
# postgres-secret is provisioned by the ExternalSecret in 00b-external-secrets.yaml.
# It pulls from AWS Secrets Manager key: skyline/postgres
# Keys required: POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD

---
# PersistentVolumeClaim: EBS volume for Postgres data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: skyline
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3
  resources:
    requests:
      storage: 10Gi

---
# StatefulSet: single Postgres instance with stable storage
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: skyline
  labels:
    app: postgres
    tier: data
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        tier: data
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "skyline_user", "-d", "skyline"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "skyline_user", "-d", "skyline"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc

---
# Headless Service: stable DNS for StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: skyline
  labels:
    app: postgres
    tier: data
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
