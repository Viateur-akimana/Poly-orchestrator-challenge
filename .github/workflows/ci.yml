name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_BACKEND_REPO: skyline-prod-backend
  ECR_FRONTEND_REPO: skyline-prod-frontend

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skyline-backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: skyline-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test --if-present

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: echo "TAG=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ steps.tag.outputs.TAG }}
        run: |
          docker build \
            -t "$ECR_REGISTRY/$ECR_BACKEND_REPO:$TAG" \
            ./skyline-backend

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_BACKEND_REPO }}:${{ steps.tag.outputs.TAG }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

      - name: Build frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ steps.tag.outputs.TAG }}
        run: |
          docker build \
            -t "$ECR_REGISTRY/$ECR_FRONTEND_REPO:$TAG" \
            ./skyline-ifrontend

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_FRONTEND_REPO }}:${{ steps.tag.outputs.TAG }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ steps.tag.outputs.TAG }}
        run: docker push "$ECR_REGISTRY/$ECR_BACKEND_REPO:$TAG"

      - name: Push frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ steps.tag.outputs.TAG }}
        run: docker push "$ECR_REGISTRY/$ECR_FRONTEND_REPO:$TAG"

      - name: Deploy to EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ steps.tag.outputs.TAG }}
          EKS_CLUSTER: ${{ secrets.EKS_CLUSTER_NAME }}
        run: |
          aws eks update-kubeconfig --name "$EKS_CLUSTER" --region "$AWS_REGION"
          # Substitute image tags and cert ARN in manifests
          export BACKEND_IMAGE_TAG="$TAG"
          export FRONTEND_IMAGE_TAG="$TAG"
          export ACM_CERT_ARN="${{ secrets.ACM_CERT_ARN }}"
          for f in infra/k8s/*.yaml; do
            envsubst < "$f" | kubectl apply -f -
          done

      - name: Summary
        run: |
          echo "### Deploy complete :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | Tag |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| backend | \`${{ steps.tag.outputs.TAG }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| frontend | \`${{ steps.tag.outputs.TAG }}\` |" >> "$GITHUB_STEP_SUMMARY"
